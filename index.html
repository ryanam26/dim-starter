<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your project is underway</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh; display: grid; place-items: center;
      background: radial-gradient(1200px 600px at 50% -10%, #1e1b4b, #0b1020 60%);
      color: #e2e8f0; text-align: center; padding: 2rem;
    }
    .wrap { max-width: 36rem; }
    .badge {
      display: inline-flex; align-items: center; gap: .5rem;
      font-size: .8rem; letter-spacing: .04em; text-transform: uppercase;
      color: #a5b4fc; border: 1px solid #312e81; border-radius: 999px;
      padding: .35rem .8rem; margin-bottom: 1.5rem;
    }
    .dot { width: .5rem; height: .5rem; border-radius: 50%; background: #818cf8; animation: pulse 1.6s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
    h1 { font-size: clamp(2rem, 5vw, 3rem); font-weight: 700; line-height: 1.1; margin-bottom: 1rem; }
    p { font-size: 1.05rem; color: #94a3b8; line-height: 1.6; }
    .foot { margin-top: 2.5rem; font-size: .85rem; color: #64748b; }
    a { color: #a5b4fc; text-decoration: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <span class="badge"><span class="dot"></span> Project kickoff</span>
    <h1>We're building something for you.</h1>
    <p>Your project is underway. This page is live now and will update automatically as work ships — bookmark it and check back anytime.</p>
    <p class="foot">Powered by <a href="https://endpointlabs.io">EndpointLabs</a></p>
  </div>
</body>
</html>
